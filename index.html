<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Journey Management Plan</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh}
  .card{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
  .header{background:linear-gradient(135deg,#006D6B,#00B2A9);color:#fff;padding:1.25rem 1.25rem 1.5rem}
  .header h1{font-size:19px;font-weight:600;margin-bottom:3px}
  .header p{font-size:12px;opacity:0.85}
  .body{flex:1;padding:1.25rem}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px}
  .field label .req{color:#D85A30}
  .field input,.field select{width:100%;font-size:16px;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;background:#fff;color:#111;-webkit-appearance:none;appearance:none;transition:border-color 0.15s,box-shadow 0.15s}
  .field input:focus,.field select:focus{outline:none;border-color:#00B2A9;box-shadow:0 0 0 3px rgba(0,178,169,0.15)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .divider{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:0.07em;margin:24px 0 14px;padding-bottom:8px;border-bottom:1.5px solid #f0f0f0}
  .btn{width:100%;padding:15px;border-radius:10px;border:none;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;background:#006D6B;color:#fff}
  .btn:disabled{background:#aaa;cursor:not-allowed}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Journey Management Plan</h1>
    <p>Millmerran Outages - Energy | Service Stream</p>
  </div>
  <div class="body">
    <p class="divider">Driver</p>
    <div class="field"><label>Full name <span class="req">*</span></label><input type="text" id="f_name" placeholder="Your full name"></div>
    <div class="field"><label>Mobile number <span class="req">*</span></label><input type="tel" id="f_mobile" placeholder="04XX XXX XXX"></div>
    <div class="field"><label>Email address <span class="req">*</span></label><input type="email" id="f_email" placeholder="your@email.com"></div>
    <p class="divider">Journey</p>
    <div class="row2">
      <div class="field"><label>Date <span class="req">*</span></label><input type="date" id="f_date"></div>
      <div class="field"><label>Time departed <span class="req">*</span></label><input type="time" id="f_time"></div>
    </div>
    <div class="field"><label>Travelling from <span class="req">*</span></label><input type="text" id="f_from" placeholder="Origin"></div>
    <div class="field"><label>Travelling to <span class="req">*</span></label><input type="text" id="f_to" placeholder="Destination"></div>
    <div class="field">
      <label>Number of passengers</label>
      <select id="f_pax">
        <option value="0">0 - travelling alone</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6+</option>
      </select>
    </div>
    <div class="field"><label>Vehicle registration <span class="req">*</span></label><input type="text" id="f_rego" placeholder="e.g. 123ABC"></div>
    <p class="divider">JMP Buddy</p>
    <div class="field"><label>Buddy name <span class="req">*</span></label><input type="text" id="f_buddy_name" placeholder="Full name"></div>
    <div class="field"><label>Buddy mobile <span class="req">*</span></label><input type="tel" id="f_buddy_mobile" placeholder="04XX XXX XXX"></div>
    <div class="field"><label>Buddy email <span class="req">*</span></label><input type="email" id="f_buddy_email" placeholder="name@servicestream.com.au"></div>
    <button class="btn" id="btnSubmit" onclick="submitForm()">Submit JMP</button>
    <div id="status" style="display:none;margin-top:14px;padding:14px;border-radius:10px;font-size:14px;line-height:1.6;text-align:center"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init({ publicKey: 'AtxEssMrYIh72-oEN' });
function v(id) { return document.getElementById(id).value.trim(); }
function showStatus(type, msg) {
  var el = document.getElementById('status');
  el.style.display = 'block';
  el.style.background = type === 'ok' ? '#E1F5EE' : type === 'err' ? '#FDEEEA' : '#f0faf8';
  el.style.color = type === 'ok' ? '#085041' : type === 'err' ? '#712B13' : '#0F6E56';
  el.style.border = type === 'ok' ? '1.5px solid #0F6E56' : type === 'err' ? '1.5px solid #993C1D' : '1.5px solid #9FE1CB';
  el.innerHTML = msg;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function submitForm() {
  var name = v('f_name'), mobile = v('f_mobile'), email = v('f_email');
  var date = v('f_date'), time = v('f_time');
  var from = v('f_from'), to = v('f_to'), pax = v('f_pax'), rego = v('f_rego');
  var buddyName = v('f_buddy_name'), buddyMobile = v('f_buddy_mobile'), buddyEmail = v('f_buddy_email');
  var missing = [];
  if (!name) missing.push('Driver name');
  if (!mobile) missing.push('Mobile');
  if (!email) missing.push('Email');
  if (!date) missing.push('Date');
  if (!time) missing.push('Time');
  if (!from) missing.push('From');
  if (!to) missing.push('To');
  if (!rego) missing.push('Rego');
  if (!buddyName) missing.push('Buddy name');
  if (!buddyMobile) missing.push('Buddy mobile');
  if (!buddyEmail) missing.push('Buddy email');
  if (missing.length) { showStatus('err', 'Please complete: ' + missing.join(', ')); return; }
  var btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  showStatus('info', 'Submitting...');
  var ref = 'JMP-' + date.replace(/-/g, '') + '-' + Math.random().toString(36).slice(2, 6).toUpperCase();
  var paxLabel = pax === '0' ? 'Travelling alone' : pax + (pax === '6' ? '+' : '') + ' passenger' + (pax === '1' ? '' : 's');
  var params = {
    ref: ref, driver_name: name, driver_mobile: mobile, driver_email: email,
    date: date, time_departed: time, from: from, to: to,
    passengers: paxLabel, rego: rego.toUpperCase(),
    buddy_name: buddyName, buddy_mobile: buddyMobile, buddy_email: buddyEmail,
    to_name: buddyName, to_email: buddyEmail
  };
  emailjs.send('service_4pj25mf', 'template_4gzriuk', params)
    .then(function() {
      var p2 = {};
      for (var k in params) p2[k] = params[k];
      p2.to_email = 'MillmerranOutageTeam@servicestream.com.au';
      p2.to_name = 'Millmerran Outage Team';
      return emailjs.send('service_4pj25mf', 'template_4gzriuk', p2);
    })
    .then(function() {
      showStatus('ok', '<strong>JMP submitted.</strong><br>Sent to ' + buddyName + ' and the Millmerran Outage Team.<br><span style="font-size:12px;opacity:0.75">Ref: ' + ref + '</span>');
      btn.textContent = 'Submitted';
    })
    .catch(function(err) {
      btn.disabled = false;
      var msg = 'Unknown error';
      if (err && err.text) msg = err.text;
      else if (err && err.message) msg = err.message;
      else try { msg = JSON.stringify(err); } catch(e) {}
      showStatus('err', 'Failed: ' + msg + '<br>Please try again.');
    });
}
document.getElementById('f_date').valueAsDate = new Date();
</script>
</body>
</html>
